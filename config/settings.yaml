mode: paper
live_trading: false
user_confirm_live: false
starting_cash: 100000
base_currency: USD
default_timeframe: "1h"
data_lookback_bars: 500
paper_loop_interval_seconds: 60
paper_max_iterations: 1
auto_trade:
  enabled: false
  submit_orders: true
  market_hours_only: true
  symbols:
    - AAPL
    - SPY
    - QQQ

market_data:
  crypto_exchange: coinbase

broker:
  name: paper
  allow_live: false
  alpaca:
    base_url: ${ALPACA_BASE_URL}
    paper: true
  binance:
    sandbox: true
  coinbase:
    api_key_env: COINBASE_API_KEY
    api_secret_env: COINBASE_API_SECRET
    key_file_env: COINBASE_KEY_FILE
    base_url: api-sandbox.coinbase.com
    sandbox: true
  interactive_brokers:
    host: ${IB_HOST}
    port: ${IB_PORT}
    client_id: ${IB_CLIENT_ID}
  fidelity:
    official_api_required: true
  custom:
    class_path: ""
    kwargs: {}

risk:
  risk_per_trade: 0.01
  max_daily_loss: 0.03
  max_drawdown: 0.10
  max_position_size: 0.20
  max_open_trades: 5
  max_slippage: 0.0025
  max_spread: 0.005
  max_volatility: 0.08
  allow_earnings_trades: false
  require_defined_options_risk: true
  trailing_stop_enabled: false

execution:
  fee_rate: 0.001
  slippage_rate: 0.0005
  min_order_value: 10

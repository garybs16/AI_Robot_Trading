services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./runtime:/app/runtime
      - ./logs:/app/logs
      - ./backtest_results:/app/backtest_results
    command: streamlit run src/dashboard.py --server.address 0.0.0.0 --server.port 8501

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./runtime:/app/runtime
      - ./logs:/app/logs
    command: uvicorn api.app:app --app-dir src --host 0.0.0.0 --port 8000
